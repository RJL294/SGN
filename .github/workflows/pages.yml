name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so live RSS feeds are re-pulled and the site stays fresh.
  # 12:00 UTC ≈ early morning in the US. GitHub may start cron a little late.
  schedule:
    - cron: '0 12 * * *'

# Permissions needed to deploy to Pages and to commit the refreshed archive.
permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Pull live good-news RSS feeds and accumulate them into data/archive.json.
      # Don't fail the deploy if a feed is down — the build falls back to what's
      # already archived plus the curated articles.
      - name: Fetch live RSS feeds
        run: npm run fetch
        continue-on-error: true

      # Persist the refreshed archive so stories accumulate across runs (and
      # retire after 3 months). Only on the scheduled/manual refresh.
      - name: Commit refreshed news archive
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "cloudbreak-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive.json
          if git diff --staged --quiet; then
            echo "No archive changes."
          else
            git commit -m "chore: refresh news archive"
            git push origin HEAD:${{ github.ref_name }}
          fi

      # Zero dependencies, so no install step is needed.
      - name: Build site
        run: npm run build

      - name: Configure Pages
        # enablement: true turns GitHub Pages on for the repo on first run.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
