name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so live RSS feeds are re-pulled and the site stays fresh.
  # 12:00 UTC ≈ early morning in the US. GitHub may start cron a little late.
  schedule:
    - cron: '0 12 * * *'

# Permissions needed for the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Pull live good-news RSS feeds. Don't fail the deploy if a feed is down —
      # the build falls back to the curated articles.
      - name: Fetch live RSS feeds
        run: npm run fetch
        continue-on-error: true

      # Zero dependencies, so no install step is needed.
      - name: Build site
        run: npm run build

      - name: Configure Pages
        # enablement: true turns GitHub Pages on for the repo on first run.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
